<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treino Estatística - Missão Lily</title>
    
    <!-- Tailwind CSS (via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (via CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel para compilar o JSX no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
        
        /* Efeito de pulso para missões desbloqueadas */
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
        .mission-active {
            animation: pulse-ring 2s infinite;
        }
    </style>

    <!-- Importação do Firebase (Cloud Database) para a Conta -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseAPI = {
            initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged,
            getFirestore, doc, setDoc, collection, onSnapshot
        };
        window.dispatchEvent(new Event('firebaseLoaded'));
    </script>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans antialiased">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Ícones SVG
        const Flame = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>;
        const Heart = ({ size, className, fill }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>;
        const RotateCcw = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
        const ArrowRight = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
        const CheckCircle2 = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
        const XCircle = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>;
        const Info = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const AlertTriangle = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>;
        const Cloud = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>;
        const Brain = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/><path d="M17.599 6.5a3 3 0 0 0 .399-1.375"/></svg>;
        const Lock = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const Unlock = ({ size, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>;
        const Star = ({ size, className, fill }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;

        const ALL_QUESTIONS = [
            { id: 1, topic: "Função Massa de Probabilidade (PMF)", question: "Uma API recebe X tickets urgentes por hora. As probabilidades são P(0)=0.40, P(1)=0.35, P(2)=0.20. Qual deve ser o valor de P(3) para que esta distribuição seja válida?", options: ["0.05", "0.15", "0.10", "1.00"], correct: 0, rationale: "Toda PMF deve somar exatamente 1. 0.40 + 0.35 + 0.20 = 0.95. Logo, 1 - 0.95 = 0.05.", hint: "Lembre-se da regra de ouro: A soma de todas as probabilidades possíveis tem de ser igual a 1." },
            { id: 2, topic: "Esperança Matemática", question: "Usando os dados da API: 0(0.40), 1(0.35), 2(0.20) e 3(0.05). Qual é a média esperada E(X) de tickets urgentes por hora?", options: ["0.75", "0.90", "1.60", "1.00"], correct: 1, rationale: "E(X) = (0 * 0.40) + (1 * 0.35) + (2 * 0.20) + (3 * 0.05) = 0 + 0.35 + 0.40 + 0.15 = 0.90 tickets/hora.", hint: "A esperança é a soma de cada valor multiplicado pela sua probabilidade." },
            { id: 3, topic: "Variância", question: "A variância mede o quê em relação à distribuição dos dados?", options: ["A soma de todas as probabilidades.", "A dispersão dos valores em relação ao centro (média) da distribuição.", "A probabilidade do evento de maior sucesso.", "A diferença entre o maior e o menor erro."], correct: 1, rationale: "Var(X) mede o espalhamento (dispersão) dos dados em torno da média esperada E(X).", hint: "Pense em quão 'espalhados' ou 'concentrados' os valores estão." },
            { id: 4, topic: "Distribuição Binomial", question: "Um classificador acerta com probabilidade p=0.80. Em 6 previsões independentes (n=6), como calcular a probabilidade de EXATAMENTE 5 acertos?", options: ["P(X=5) = 6 * 0.80 * 0.20", "P(X=5) = C(6,5) * 0.80^5 * 0.20^1", "P(X=5) = 0.80^5", "P(X=5) = C(6,5) * 0.20^5 * 0.80^1"], correct: 1, rationale: "Fórmula Binomial: P(X=k) = C(n,k) * p^k * (1-p)^(n-k). Sucesso p=0.80 (elevado a 5), fracasso 1-p=0.20 (elevado a 1).", hint: "Você precisa combinar os sucessos C(n,k) e multiplicar pelas probabilidades de sucesso e fracasso." },
            { id: 5, topic: "Distribuição de Poisson", question: "Uma fila recebe em média 4 jobs por minuto (λ = 4). Se quiser calcular a probabilidade de receber 0 jobs em 30 segundos, qual o valor de λ deve usar?", options: ["λ = 4", "λ = 8", "λ = 2", "λ = 0.5"], correct: 2, rationale: "Se o intervalo de tempo cai pela metade (de 1 min para 30 seg), a taxa média λ também cai pela metade. 4 * 0.5 = 2.", hint: "Ajuste a taxa λ proporcionalmente ao novo intervalo de tempo. Nunca misture minuto com segundo!" },
            { id: 6, topic: "Distribuição Normal (Z-score)", question: "A latência de uma API tem média μ=120ms e desvio-padrão σ=20ms. Qual é o escore-z de uma requisição com 170ms?", options: ["1.5", "2.5", "3.0", "50"], correct: 1, rationale: "z = (x - μ) / σ -> (170 - 120) / 20 = 50 / 20 = 2.5 desvios-padrão acima da média.", hint: "Z é a distância do valor até à média, dividida pelo desvio-padrão." },
            { id: 7, topic: "Teorema Central do Limite (TCL)", question: "O que o Teorema Central do Limite afirma sobre as médias amostrais?", options: ["Que amostras grandes corrigem a recolha enviesada.", "Que a média da amostra será sempre igual à variância.", "Mesmo que a população original não seja Normal, a distribuição das médias amostrais aproxima-se da Normal para n grande.", "Que o desvio-padrão aumenta conforme o tamanho da amostra (n) aumenta."], correct: 2, rationale: "O TCL é a magia da estatística: independentemente da forma original, as médias de amostras grandes sempre convergem para uma curva Normal.", hint: "Por que motivo a curva de sino (Normal) aparece em tudo? Tem a ver com amostras grandes..." },
            { id: 8, topic: "Erro-Padrão (EP)", question: "O tempo de resposta tem um desvio-padrão σ=120ms. Se recolhermos uma amostra de n=36 requisições, qual é o erro-padrão da média?", options: ["120 ms", "3.33 ms", "20 ms", "6 ms"], correct: 2, rationale: "A fórmula do Erro-Padrão é EP = σ / √n. Então: 120 / √36 = 120 / 6 = 20 ms.", hint: "Divida o desvio-padrão pela raiz quadrada do tamanho da amostra (n)." },
            { id: 9, topic: "Intervalo de Confiança (IC)", question: "Gerou um IC de 95% para o tempo médio de resposta: [230.2, 249.8] ms. O que isso significa?", options: ["Há 95% de probabilidade do tempo médio da próxima requisição cair aí dentro.", "95% de todos os tempos de resposta do servidor estão nesse intervalo.", "O método utilizado captura a média real em cerca de 95% das amostras repetidas.", "O servidor nunca passará de 249.8 ms em 95% dos dias."], correct: 2, rationale: "IC fala sobre a confiabilidade do MÉTODO, não sobre um parâmetro aleatório ou sobre os dados individuais. Não use a frase '95% de probabilidade da média estar ali'.", hint: "Cuidado! O IC avalia o método de amostragem, não os dados isolados." },
            { id: 10, topic: "Correlação de Pearson", question: "O cálculo de correlação entre 'Utilizadores ativos (X)' e 'Latência média (Y)' resultou em r = 0.82. O que isso indica?", options: ["Associação linear positiva forte: mais utilizadores tendem a gerar maior latência.", "Associação fraca e muita dispersão de dados.", "Causalidade comprovada: os utilizadores são a única causa da lentidão.", "Relação decrescente: a latência cai quando os utilizadores aumentam."], correct: 0, rationale: "Um r=0.82 é próximo de +1, indicando tendência positiva e forte. Mas ATENÇÃO: correlação NÃO implica causalidade automática.", hint: "Olhe para o sinal (positivo) e para a magnitude (perto de 1 é forte)." },
            { id: 11, topic: "Causalidade x Correlação", question: "Se r=0.90 entre duas variáveis de um sistema, podemos afirmar causalidade com base apenas nisso?", options: ["Sim, r > 0.8 já comprova causalidade.", "Não, pois pode haver uma variável de confusão influenciando ambas (ex: pico de horário ou deploy recente).", "Sim, desde que a amostra seja superior a 30.", "Não, pois r deveria ser exatamente 1.00 para provar causalidade."], correct: 1, rationale: "Correlação não é causalidade. Você precisa de experiências controladas ou ordem temporal para provar causa e efeito.", hint: "Duas coisas a crescerem juntas não significa que uma puxa a outra. Pode haver um terceiro elemento na história." },
            { id: 12, topic: "Regra Empírica (Curva Normal)", question: "Pela regra empírica da Normal, aproximadamente qual a percentagem dos dados que fica a 2 desvios-padrão (±2σ) de distância da média?", options: ["68%", "95%", "99.7%", "50%"], correct: 1, rationale: "Regra empírica: ±1σ = ~68%, ±2σ = ~95%, ±3σ = ~99.7%. O diapositivo do professor cobra isso (95.44% exato, ou 95% prático).", hint: "Lembre-se do gráfico em sino. ±1 desvio é a maioria simples, ±2 desvios abrange a grande maioria." }
        ];

        // Definição das Missões (Estilo Duolingo)
        const MISSIONS_DATA = [
            { id: 1, title: "Fundamentos Rápidos", subtitle: "PMF, Esperança e Variância", qIds: [1, 2, 3] },
            { id: 2, title: "Distribuições Base", subtitle: "Binomial, Poisson e Normal", qIds: [4, 5, 6] },
            { id: 3, title: "TCL & Precisão", subtitle: "Teorema Central do Limite e Erro-Padrão", qIds: [7, 8, 12] },
            { id: 4, title: "Inferência Letal", subtitle: "Correlação, Causalidade e Int. Confiança", qIds: [9, 10, 11] }
        ];

        const shuffleArray = (array) => [...array].sort(() => Math.random() - 0.5);

        const LilyAvatar = ({ mood }) => {
            const getStyle = () => {
                switch(mood) {
                    case 'happy': return 'bg-green-600 border-green-400 shadow-[0_0_15px_rgba(74,222,128,0.5)]';
                    case 'angry': return 'bg-red-700 border-red-500 shadow-[0_0_20px_rgba(239,68,68,0.7)]';
                    case 'thinking': return 'bg-red-900 border-red-700';
                    default: return 'bg-zinc-800 border-zinc-700';
                }
            };

            const getFace = () => {
                switch(mood) {
                    case 'happy': return '( ⌐■_■)';
                    case 'angry': return '( ಠ_ಠ )';
                    case 'thinking': return '( ¬_¬)';
                    default: return '( •_•)';
                }
            };

            return (
                <div className="flex flex-col items-center z-10">
                    <div className={`w-20 h-20 rounded-full border-4 flex items-center justify-center text-white text-2xl font-black transition-all duration-300 ${getStyle()}`}>
                        {getFace()}
                    </div>
                    <span className="text-xs font-bold mt-2 text-zinc-400 uppercase tracking-widest bg-zinc-950 px-2 rounded-full">Lily</span>
                </div>
            );
        };

        function App() {
            // Nuvem (Firebase)
            const [user, setUser] = useState(null);
            const [savedStats, setSavedStats] = useState({ gamesPlayed: 0, bestScore: 0, allTimeWrong: [], highestUnlocked: 1 });
            const [db, setDb] = useState(null);

            // Interface
            const [step, setStep] = useState('intro'); // intro, quiz, results
            const [activeMission, setActiveMission] = useState(null); // ID da missão atual
            
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [hearts, setHearts] = useState(3); // Reduzido para 3 corações (aprender rápido)
            const [wrongAnswers, setWrongAnswers] = useState([]);
            const [selectedOption, setSelectedOption] = useState(null);
            const [isAnswered, setIsAnswered] = useState(false);
            const [isCorrect, setIsCorrect] = useState(false);
            const [mood, setMood] = useState('thinking');
            const [quizSet, setQuizSet] = useState([]);
            const [isReviewMode, setIsReviewMode] = useState(false);

            // Inicializa Firebase Auth
            useEffect(() => {
                const initFb = async () => {
                    const fbAPI = window.FirebaseAPI;
                    if (!fbAPI) return;
                    try {
                        const config = typeof __firebase_config !== 'undefined' && __firebase_config ? JSON.parse(__firebase_config) : null;
                        if (!config) return;
                        const app = fbAPI.initializeApp(config);
                        const auth = fbAPI.getAuth(app);
                        const fireDb = fbAPI.getFirestore(app);
                        setDb(fireDb);

                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await fbAPI.signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await fbAPI.signInAnonymously(auth);
                        }
                        fbAPI.onAuthStateChanged(auth, setUser);
                    } catch (e) { console.error("Firebase Error:", e); }
                };
                
                if (window.FirebaseAPI) initFb();
                else window.addEventListener('firebaseLoaded', initFb);
            }, []);

            // Busca os dados da Conta
            useEffect(() => {
                if (!user || !db || !window.FirebaseAPI) return;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                const docRef = window.FirebaseAPI.doc(db, 'artifacts', appId, 'users', user.uid, 'stats', 'progress');

                const unsubscribe = window.FirebaseAPI.onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        // Garantir que a propriedade highestUnlocked exista nas contas antigas
                        setSavedStats({ ...data, highestUnlocked: data.highestUnlocked || 1 });
                    } else {
                        window.FirebaseAPI.setDoc(docRef, { gamesPlayed: 0, bestScore: 0, allTimeWrong: [], highestUnlocked: 1 });
                    }
                }, (err) => console.error(err));

                return () => unsubscribe();
            }, [user, db]);

            // Salvar Progresso Final de uma Missão
            useEffect(() => {
                if (step === 'results' && user && db && !isReviewMode) {
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                    const docRef = window.FirebaseAPI.doc(db, 'artifacts', appId, 'users', user.uid, 'stats', 'progress');
                    
                    const sessionWrongIds = wrongAnswers.map(q => q.id);
                    const historicalWrongs = savedStats.allTimeWrong || [];
                    const updatedWrongs = [...new Set([...historicalWrongs, ...sessionWrongIds])];
                    
                    // Se o usuário sobreviveu (hearts > 0), ele passa a missão
                    let newUnlocked = savedStats.highestUnlocked || 1;
                    if (hearts > 0 && activeMission && activeMission.id === newUnlocked) {
                        newUnlocked = Math.min(4, newUnlocked + 1); // 4 é o total de missões
                    }

                    window.FirebaseAPI.setDoc(docRef, {
                        gamesPlayed: (savedStats.gamesPlayed || 0) + 1,
                        bestScore: Math.max(savedStats.bestScore || 0, score),
                        allTimeWrong: updatedWrongs,
                        highestUnlocked: newUnlocked
                    });
                }
            }, [step]);


            const startMission = (missionId) => {
                const mission = MISSIONS_DATA.find(m => m.id === missionId);
                const questions = ALL_QUESTIONS.filter(q => mission.qIds.includes(q.id));
                
                setActiveMission(mission);
                setQuizSet(shuffleArray(questions));
                setWrongAnswers([]);
                setCurrentIndex(0);
                setScore(0);
                setHearts(3); // 3 Corações para ser rápido e letal
                setIsAnswered(false);
                setSelectedOption(null);
                setStep('quiz');
                setMood('thinking');
                setIsReviewMode(false);
            };

            const startMegaReview = () => {
                if (!savedStats.allTimeWrong || savedStats.allTimeWrong.length === 0) return;
                
                const historyQuestions = ALL_QUESTIONS.filter(q => savedStats.allTimeWrong.includes(q.id));
                const reviewSet = shuffleArray(historyQuestions).map(q => ({
                    ...q,
                    question: `[REVISÃO PERPÉTUA] Você errou isto no passado. Deus está observando se você aprendeu: ${q.question}`,
                    topic: `🧠 HISTÓRICO: ${q.topic}`
                }));
                
                setActiveMission({ id: 'review', title: "Mega Revisão", subtitle: "Todos os seus erros passados" });
                setQuizSet(reviewSet);
                setWrongAnswers([]);
                setCurrentIndex(0);
                setScore(0);
                setHearts(5); // 5 corações para a Mega Revisão
                setIsAnswered(false);
                setSelectedOption(null);
                setStep('quiz');
                setMood('thinking');
                setIsReviewMode(true);
            };

            const handleAnswer = (index) => {
                if (isAnswered) return;
                setSelectedOption(index);
                setIsAnswered(true);
                
                const correct = index === quizSet[currentIndex].correct;
                setIsCorrect(correct);

                if (correct) {
                    setScore(s => s + 1);
                    setMood('happy');
                } else {
                    setHearts(h => Math.max(0, h - 1));
                    if (!isReviewMode) {
                        setWrongAnswers(prev => {
                            if (!prev.find(p => p.id === quizSet[currentIndex].id)) {
                                return [...prev, quizSet[currentIndex]];
                            }
                            return prev;
                        });
                    }
                    setMood('angry');
                }
            };

            const nextQuestion = () => {
                if (currentIndex < quizSet.length - 1) {
                    setCurrentIndex(c => c + 1);
                    setIsAnswered(false);
                    setSelectedOption(null);
                    setMood('thinking');
                } else {
                    setStep('results');
                }
            };

            if (step === 'intro') {
                const unlockedLevel = savedStats.highestUnlocked || 1;
                
                return (
                    <div className="min-h-screen flex flex-col items-center py-10 px-4 relative overflow-hidden">
                        {/* Background Deco */}
                        <div className="fixed -top-40 -left-40 w-96 h-96 bg-red-900/10 rounded-full blur-3xl pointer-events-none"></div>
                        <div className="fixed -bottom-40 -right-40 w-96 h-96 bg-red-900/10 rounded-full blur-3xl pointer-events-none"></div>

                        <div className="w-full max-w-md z-10 flex flex-col items-center">
                            <LilyAvatar mood="thinking" />
                            
                            <h1 className="text-3xl font-black mt-4 mb-1 text-white text-center">Simulador CC3M</h1>
                            <p className="text-red-400 font-bold mb-6 uppercase tracking-wider text-sm text-center">Caminho da Aprovação</p>
                            
                            {user ? (
                                <div className="bg-zinc-900/80 p-3 rounded-2xl w-full mb-6 border border-zinc-800 flex justify-between items-center shadow-lg">
                                    <div className="flex items-center gap-2 text-zinc-300">
                                        <Cloud size={16} className="text-green-400" />
                                        <span className="text-xs font-bold uppercase tracking-wider">Conta Nuvem Ativa</span>
                                    </div>
                                    <div className="text-xs font-bold bg-zinc-800 px-3 py-1 rounded-full text-zinc-400">
                                        Total Jogos: <span className="text-white">{savedStats.gamesPlayed || 0}</span>
                                    </div>
                                </div>
                            ) : (
                                <p className="text-zinc-500 text-xs mb-6 animate-pulse">Conectando à nuvem...</p>
                            )}
                            
                            <p className="text-zinc-400 mb-8 text-center text-sm leading-relaxed bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800">
                                "Você acha que a Ada Wong chegou onde chegou enrolando? Rapidez! Com a graça de Deus, sobreviva a essas missões para a prova de amanhã. Eu dividi o conteúdo do professor Eli para você não surtar."
                            </p>
                            
                            {/* Path das Missões */}
                            <div className="w-full flex flex-col items-center space-y-6 relative mb-10">
                                {/* Linha vertical atrás dos botões */}
                                <div className="absolute top-0 bottom-0 left-1/2 transform -translate-x-1/2 w-1.5 bg-zinc-800 -z-10 rounded-full"></div>
                                
                                {MISSIONS_DATA.map((mission, idx) => {
                                    const isUnlocked = mission.id <= unlockedLevel;
                                    const isCurrent = mission.id === unlockedLevel;
                                    const isCompleted = mission.id < unlockedLevel;
                                    
                                    let btnStyle = "bg-zinc-800 border-zinc-700 text-zinc-500 opacity-50 cursor-not-allowed";
                                    let Icon = Lock;
                                    
                                    if (isCompleted) {
                                        btnStyle = "bg-green-900/40 border-green-700 text-green-300 shadow-[0_0_15px_rgba(21,128,61,0.3)]";
                                        Icon = Star;
                                    } else if (isCurrent) {
                                        btnStyle = "bg-red-700 border-red-500 text-white shadow-[0_0_20px_rgba(185,28,28,0.5)] mission-active cursor-pointer";
                                        Icon = Flame;
                                    }

                                    return (
                                        <div key={mission.id} className="flex flex-col items-center group w-full">
                                            <button 
                                                disabled={!isUnlocked}
                                                onClick={() => startMission(mission.id)}
                                                className={`w-20 h-20 rounded-full border-4 flex items-center justify-center transition-all transform ${isUnlocked ? 'hover:scale-110 active:scale-95 cursor-pointer' : ''} ${btnStyle}`}
                                            >
                                                <Icon size={32} fill={isCompleted ? "currentColor" : "none"} />
                                            </button>
                                            <div className="text-center mt-3 bg-zinc-950/80 px-4 py-1 rounded-full border border-zinc-800/50">
                                                <h3 className={`font-black text-sm uppercase ${isUnlocked ? 'text-white' : 'text-zinc-600'}`}>{mission.title}</h3>
                                                <p className={`text-xs font-medium ${isUnlocked ? 'text-red-400' : 'text-zinc-700'}`}>{mission.subtitle}</p>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                            {/* Mega Revisão */}
                            {savedStats?.allTimeWrong?.length > 0 && (
                                <button 
                                    onClick={startMegaReview}
                                    className="w-full bg-purple-900/40 border border-purple-700 hover:bg-purple-800 text-purple-200 font-black py-4 rounded-2xl transition-all flex items-center justify-center gap-2 mt-4 shadow-lg shadow-purple-900/20"
                                >
                                    <Brain size={20} /> REVISÃO DOS ERROS (BOSS)
                                </button>
                            )}
                        </div>
                    </div>
                );
            }

            if (step === 'results') {
                const survived = hearts > 0;
                
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4">
                        <div className="max-w-md w-full bg-zinc-900 p-8 rounded-3xl shadow-2xl text-center border border-zinc-800">
                            <LilyAvatar mood={survived ? 'happy' : 'angry'} />
                            
                            <h2 className="text-3xl font-black mt-6 mb-2 text-white">
                                {survived ? "Missão Cumprida" : "Você foi Abatido"}
                            </h2>
                            
                            <p className="text-zinc-400 mb-6 font-medium">
                                {survived 
                                    ? "Com a ajuda de Deus, você sobreviveu a esta etapa. A Ada Wong estaria orgulhosa." 
                                    : "Falta de foco! Zero corações. Tente novamente."}
                            </p>

                            <div className="flex justify-center gap-4 my-6">
                                <div className="bg-zinc-800 p-4 rounded-2xl w-24 border border-zinc-700">
                                    <span className="block text-3xl font-black text-green-500">{score}</span>
                                    <span className="text-xs text-zinc-400 uppercase font-bold">Acertos</span>
                                </div>
                                <div className="bg-zinc-800 p-4 rounded-2xl w-24 border border-zinc-700">
                                    <span className="block text-3xl font-black text-red-500">{quizSet.length - score}</span>
                                    <span className="text-xs text-zinc-400 uppercase font-bold">Erros</span>
                                </div>
                            </div>
                            
                            <button 
                                onClick={() => setStep('intro')}
                                className="w-full bg-red-700 hover:bg-red-600 text-white font-black py-4 rounded-2xl transition-all transform hover:scale-[1.02] flex items-center justify-center gap-2 mt-6 shadow-lg shadow-red-900/50"
                            >
                                <ArrowRight size={20} /> VOLTAR AO MAPA
                            </button>
                        </div>
                    </div>
                );
            }

            const currentQuestion = quizSet[currentIndex];

            return (
                <div className="min-h-screen flex flex-col max-w-2xl mx-auto md:py-8 bg-zinc-950">
                    
                    {/* Header: Progresso e Corações */}
                    <div className="flex items-center justify-between p-4 mb-4 bg-zinc-900/50 border-b border-zinc-800 sticky top-0 z-20 backdrop-blur-md md:rounded-3xl md:border">
                        <div className="flex items-center gap-3">
                            <button onClick={() => setStep('intro')} className="text-zinc-500 hover:text-white transition-colors">
                                <RotateCcw size={20} />
                            </button>
                            <span className="font-black text-sm text-zinc-400 uppercase tracking-wider hidden sm:block">
                                {activeMission?.title}
                            </span>
                        </div>
                        <div className="flex-1 mx-4 bg-zinc-800 h-3 rounded-full overflow-hidden border border-zinc-700 max-w-[200px]">
                            <div 
                                className="h-full bg-green-500 transition-all duration-300 ease-out"
                                style={{ width: `${((currentIndex) / quizSet.length) * 100}%` }}
                            />
                        </div>
                        <div className="flex items-center gap-1.5 font-black text-red-500 text-xl">
                            <Heart size={24} fill="currentColor" className={hearts === 1 ? 'animate-pulse' : ''} />
                            <span>{hearts}</span>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col px-4">
                        <div className="flex gap-4 mb-8 items-start">
                            <LilyAvatar mood={mood} />
                            <div className="relative bg-zinc-800 p-5 rounded-3xl rounded-tl-none flex-1 shadow-lg border border-zinc-700 mt-2">
                                <div className="absolute -left-3 top-0 w-0 h-0 border-t-[15px] border-t-zinc-800 border-l-[15px] border-l-transparent"></div>
                                <p className="text-xs font-black text-red-400 uppercase mb-2 tracking-wider flex items-center justify-between">
                                    <span>{currentQuestion?.topic}</span>
                                    <span className="text-zinc-500 bg-zinc-900 px-2 rounded">{currentIndex + 1}/{quizSet.length}</span>
                                </p>
                                <p className="text-[17px] leading-relaxed font-medium text-white">{currentQuestion?.question}</p>
                            </div>
                        </div>

                        <div className="space-y-3 pb-36">
                            {currentQuestion?.options.map((opt, i) => {
                                let style = "border-zinc-700 bg-zinc-900 hover:bg-zinc-800 text-white";
                                if (isAnswered) {
                                    if (i === currentQuestion.correct) {
                                        style = "border-green-500 bg-green-500/20 text-green-300";
                                    } else if (i === selectedOption) {
                                        style = "border-red-500 bg-red-500/20 text-red-300";
                                    } else {
                                        style = "border-zinc-800 bg-zinc-900/50 opacity-40 text-zinc-500";
                                    }
                                }

                                return (
                                    <button
                                        key={i}
                                        disabled={isAnswered}
                                        onClick={() => handleAnswer(i)}
                                        className={`w-full p-4 rounded-2xl border-2 text-left font-medium transition-all duration-150 transform active:scale-[0.98] ${style}`}
                                    >
                                        {opt}
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    {/* Bottom Action Bar */}
                    <div className={`fixed bottom-0 left-0 right-0 p-4 border-t transition-all duration-300 transform md:max-w-2xl md:mx-auto md:rounded-t-3xl z-30 ${
                        isAnswered 
                            ? (isCorrect ? 'bg-zinc-900 border-green-900/50' : 'bg-zinc-900 border-red-900/50') 
                            : 'translate-y-full bg-zinc-900 border-zinc-800'
                    }`}>
                        
                        {isAnswered && (
                            <div className="mb-4 max-h-40 overflow-y-auto">
                                <div className="flex items-center gap-2 mb-2">
                                    {isCorrect ? <CheckCircle2 className="text-green-500" size={24} /> : <XCircle className="text-red-500" size={24} />}
                                    <span className={`font-black text-lg ${isCorrect ? 'text-green-500' : 'text-red-500'}`}>
                                        {isCorrect ? 'Perfeito. Rápido e limpo.' : 'Inaceitável. Memorize isso.'}
                                    </span>
                                </div>
                                <p className="text-sm text-zinc-300 bg-zinc-800 p-3 rounded-xl border border-zinc-700">
                                    {currentQuestion.rationale}
                                </p>
                            </div>
                        )}

                        <button
                            onClick={nextQuestion}
                            disabled={!isAnswered}
                            className={`w-full py-4 rounded-2xl font-black flex items-center justify-center gap-2 transition-all transform active:scale-95 ${
                                isAnswered 
                                    ? (isCorrect ? 'bg-green-600 hover:bg-green-500 text-white' : 'bg-red-700 hover:bg-red-600 text-white') 
                                    : 'bg-zinc-800 text-zinc-600 cursor-not-allowed hidden'
                            }`}
                        >
                            AVANÇAR <ArrowRight size={20} />
                        </button>
                    </div>

                    {/* Game Over Modal Embutido */}
                    {hearts === 0 && (
                        <div className="fixed inset-0 bg-zinc-950/95 flex flex-col items-center justify-center p-6 z-50 backdrop-blur-sm">
                            <AlertTriangle size={80} className="text-red-600 mb-6 animate-pulse" />
                            <h2 className="text-3xl font-black text-white mb-2 text-center uppercase tracking-widest">Missão Falhou</h2>
                            <p className="text-zinc-400 text-center mb-8 max-w-sm text-base leading-relaxed bg-zinc-900 p-4 rounded-2xl border border-red-900/30">
                                A Ada Wong não tolera fraqueza. Você perdeu todos os seus corações. Deus te dê paciência, pois você terá que começar esta missão de novo.
                            </p>
                            <button 
                                onClick={() => setStep('intro')}
                                className="w-full max-w-xs bg-red-700 text-white hover:bg-red-600 font-black py-4 rounded-2xl transition-all transform hover:scale-105 active:scale-95 flex justify-center items-center gap-2 shadow-lg shadow-red-900/50"
                            >
                                <RotateCcw size={20} /> RETORNAR AO MAPA
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
